services:
  - type: web
    name: ai-support-assistant-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm && python -m backend.training.train_intent
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: AI Support Assistant
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: https://ai-support-assistant.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
